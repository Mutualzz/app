appId: com.mutualzz.app
productName: Mutualzz
icon: resources/icons/icon.png
afterPack: afterPack.js
afterSign: afterSign.js
directories:
  buildResources: resources
files:
  - "out/**"
  - "node_modules/**"
  - "resources/**/*"
  - "!src/*"
  - "!electron.vite.config.{js,ts,mjs,cjs}"
  - "!{.env,.env.*,.npmrc,pnpm-lock.yaml}"
  - "!.env.production"
  - "!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}"
asarUnpack:
  - resources/**/*
  - "**/{keytar,keytar.node}/**"

win:
  executableName: mutualzz
  icon: resources/icons/icon.ico
  extraFiles:
    - from: resources/updater.exe
      to: updater.exe

nsis:
  oneClick: true
  perMachine: false
  allowElevation: false
  createDesktopShortcut: false
  createStartMenuShortcut: false
  runAfterFinish: false
  artifactName: ${productName}Setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  warningsAsErrors: false
  include: "resources/installer.nsh"
  installerIcon: "resources/icons/icon.ico"
  deleteAppDataOnUninstall: false

mac:
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: "build/entitlements.mac.plist"
  entitlementsInherit: "build/entitlements.mac.inherit.plist"
  signIgnore:
    - "Contents/MacOS/Mutualzz$"
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSAudioCaptureUsageDescription: Application requests access to capture system audio for screen sharing.
    - NSScreenCaptureDescription: Application requests access to record your screen for voice channel screen sharing.
    - CFBundleName: Mutualzz
  notarize: false
  target:
    - target: dmg
      arch: universal
  x64ArchFiles: "Contents/MacOS/Mutualzz"

dmg:
  artifactName: ${productName}.${ext}

linux:
  executableName: mutualzz
  extraFiles:
    - from: resources/updater
      to: updater
  target:
    - AppImage
    - deb
    - rpm
    - pacman
  maintainer: Mutualzz
  category: Social Networking
  artifactName: ${productName}.${ext}

appImage:
  artifactName: ${productName}.${ext}

deb:
  artifactName: ${productName}.${ext}

rpm:
  artifactName: ${productName}.${ext}

pacman:
  artifactName: ${productName}.${ext}

publish:
  provider: github
  owner: mutualzz
  repo: mutualzz
  releaseType: release

electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
